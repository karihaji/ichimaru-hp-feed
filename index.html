<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>市丸グループ 外部発信・更新情報</title>
    <link rel="icon" href="assets/default-favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2933;
        --muted: #687582;
        --line: #d8e0e7;
        --panel: #ffffff;
        --page: #f5f7f9;
        --accent: #176b7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Yu Gothic", "YuGothic", "Meiryo", system-ui, sans-serif;
        background: var(--page);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      main {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 12px 36px rgb(31 41 51 / 8%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.35rem, 3vw, 1.8rem);
        line-height: 1.4;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
      }

      nav {
        display: grid;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        min-height: 56px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        text-decoration: none;
        background: #fff;
      }

      a:hover,
      a:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      span {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>市丸グループ 外部発信・更新情報</h1>
      <p>SharePoint埋め込み用ページを選択してください。</p>
      <nav aria-label="表示ページ">
        <a href="compact/">コンパクト表示 <span>/compact/</span></a>
        <a href="list/">一覧表示 <span>/list/</span></a>
      </nav>
    </main>
  </body>
</html>

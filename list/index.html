<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>市丸グループ 公式HP記事一覧</title>
    <link rel="icon" href="../assets/default-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="list.css?v=20260628-more-button-blue">
  </head>
  <body>
    <main class="archive-shell" aria-labelledby="page-title">
      <header class="archive-header">
        <div>
          <p class="eyebrow">市丸グループ</p>
          <h1 id="page-title">公式HP記事一覧</h1>
        </div>
        <p class="lead">グループ各社・各施設の公式HPに掲載された記事を、掲載日順に蓄積して表示します。</p>
      </header>

      <section class="filters" aria-label="記事の絞り込み">
        <label>
          <span>掲載元</span>
          <select id="source-filter">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>カテゴリ</span>
          <select id="category-filter">
            <option value="">すべて</option>
          </select>
        </label>
        <label>
          <span>年月</span>
          <select id="month-filter">
            <option value="">すべて</option>
          </select>
        </label>
        <label class="search-label">
          <span>キーワード</span>
          <input id="keyword-filter" type="search" placeholder="タイトル・掲載元で検索">
        </label>
      </section>

      <section class="archive-results" aria-labelledby="result-title">
        <div class="section-heading">
          <h2 id="result-title">記事一覧</h2>
          <p id="result-count" class="result-count">読み込み中</p>
        </div>
        <div id="article-grid" class="article-grid" aria-live="polite">
          <p class="empty-message">公式HP記事を読み込んでいます。</p>
        </div>
        <div class="more-area">
          <button id="more-button" class="more-button" type="button" hidden>もっと見る</button>
        </div>
      </section>

      <footer class="archive-footer">
        <p id="last-updated">データ確認中</p>
      </footer>
    </main>

    <script src="list.js?v=20260628-more-button-blue" type="module"></script>
  </body>
</html>

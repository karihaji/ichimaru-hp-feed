<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>市丸グループ 外部発信・更新情報</title>
    <link rel="icon" href="../assets/default-favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="compact.css?v=20260628-list-button-blue">
  </head>
  <body>
    <main class="feed-shell" aria-label="市丸グループ 外部発信・更新情報">
      <section class="operation-band" aria-labelledby="operation-title">
        <div class="section-heading">
          <h2 id="operation-title">運航情報</h2>
          <p id="operation-updated" class="updated-text">確認中</p>
        </div>
        <div id="operation-list" class="operation-list" aria-live="polite">
          <p class="empty-message">運航情報を読み込んでいます。</p>
        </div>
      </section>

      <section class="tab-area" aria-label="外部発信情報">
        <div class="tabs" role="tablist" aria-label="表示切替">
          <button id="tab-official" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="panel-official">公式HP</button>
          <button id="tab-store" class="tab" type="button" role="tab" aria-selected="false" aria-controls="panel-store">遊技店舗</button>
        </div>

        <div id="panel-official" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-official">
          <div class="section-heading">
            <h2>各サイト最新1件</h2>
            <p id="official-count" class="updated-text">読み込み中</p>
          </div>
          <div id="official-list" class="official-list" aria-live="polite">
            <p class="empty-message">公式HP記事を読み込んでいます。</p>
          </div>
        </div>

        <div id="panel-store" class="tab-panel" role="tabpanel" aria-labelledby="tab-store" hidden>
          <div class="section-heading">
            <h2>外部掲載ページ</h2>
            <p id="store-count" class="updated-text">読み込み中</p>
          </div>
          <div id="store-list" class="store-list" aria-live="polite">
            <p class="empty-message">遊技店舗の更新状況を読み込んでいます。</p>
          </div>
        </div>
      </section>

      <footer class="feed-footer">
        <p id="last-updated">データ確認中</p>
        <a
          class="list-button"
          href="https://ichimarugroup.sharepoint.com/sites/ichimaru-internal-portal/SitePages/%E5%B8%82%E4%B8%B8%E3%82%B0%E3%83%AB%E3%83%BC%E3%83%97%E5%90%84%E7%A4%BEHP%E6%9C%80%E6%96%B0%E8%A8%98%E4%BA%8B%E4%B8%80%E8%A6%A7.aspx"
          target="_top"
        >一覧を見る</a>
      </footer>
    </main>

    <script src="compact.js?v=20260628-list-button-blue" type="module"></script>
  </body>
</html>

name: Update feed data

on:
  workflow_dispatch:
  schedule:
    # JST 07:10 - ship operation status after early-morning announcements.
    - cron: "10 22 * * *"
    # JST 10:00 - morning office check.
    - cron: "0 1 * * *"
    # JST 12:00 - midday check.
    - cron: "0 3 * * *"
    # JST 15:00 - afternoon business-hours check.
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate files
        run: npm run validate

      - name: Fetch external updates
        run: npm run fetch

      - name: Commit updated data
        run: |
          if git diff --quiet -- data; then
            echo "No data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "Update feed data"
          git push
